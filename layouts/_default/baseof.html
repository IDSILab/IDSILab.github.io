<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ .Site.Params.labNameEn }}">
  <title>{{ if .IsHome }}{{ .Site.Title }} | {{ .Site.Params.labNameEn }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" href="{{ "assets/favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
