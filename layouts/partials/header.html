      <img src="{{ "assets/logo.svg" | relURL }}" alt="IDSI Lab logo">
    </a>
    <nav class="nav" aria-label="Primary navigation">
      <a href="{{ "/" | relURL }}" class="{{ if .IsHome }}active{{ end }}">首页</a>

      <a href="{{ "/outputs/" | relURL }}" class="{{ if eq .RelPermalink "/outputs/" }}active{{ end }}">成果</a>
      <a href="{{ "/join/" | relURL }}" class="{{ if eq .RelPermalink "/join/" }}active{{ end }}">招生</a>
      <a href="{{ "/contact/" | relURL }}" class="{{ if eq .RelPermalink "/contact/" }}active{{ end }}">联系</a>
