<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ "/" | relLangURL }}" aria-label="IDSI Lab home">
      <img src="{{ "assets/logo.svg" | relURL }}" alt="IDSI Lab logo">
    </a>
    <nav class="nav" aria-label="Primary navigation">
      {{ if eq .Site.Language.Lang "en" }}
      <a href="{{ "/" | relLangURL }}" class="{{ if .IsHome }}active{{ end }}">Home</a>
      <a href="{{ "/about/" | relLangURL }}" class="{{ if eq .RelPermalink "/en/about/" }}active{{ end }}">Overview</a>
      <a href="{{ "/research/" | relLangURL }}" class="{{ if eq .RelPermalink "/en/research/" }}active{{ end }}">Research</a>
      <a href="{{ "/team/" | relLangURL }}" class="{{ if eq .RelPermalink "/en/team/" }}active{{ end }}">Team</a>
      <a href="{{ "/outputs/" | relLangURL }}" class="{{ if eq .RelPermalink "/en/outputs/" }}active{{ end }}">Outputs</a>
      <a href="{{ "/join/" | relLangURL }}" class="{{ if eq .RelPermalink "/en/join/" }}active{{ end }}">Join</a>
      <a href="{{ "/contact/" | relLangURL }}" class="{{ if eq .RelPermalink "/en/contact/" }}active{{ end }}">Contact</a>
      {{ else }}
      <a href="{{ "/" | relLangURL }}" class="{{ if .IsHome }}active{{ end }}">首页</a>
      <a href="{{ "/about/" | relLangURL }}" class="{{ if eq .RelPermalink "/about/" }}active{{ end }}">实验室概况</a>
      <a href="{{ "/research/" | relLangURL }}" class="{{ if eq .RelPermalink "/research/" }}active{{ end }}">研究方向</a>
      <a href="{{ "/team/" | relLangURL }}" class="{{ if eq .RelPermalink "/team/" }}active{{ end }}">团队</a>
      <a href="{{ "/outputs/" | relLangURL }}" class="{{ if eq .RelPermalink "/outputs/" }}active{{ end }}">成果</a>
      <a href="{{ "/join/" | relLangURL }}" class="{{ if eq .RelPermalink "/join/" }}active{{ end }}">招生</a>
      <a href="{{ "/contact/" | relLangURL }}" class="{{ if eq .RelPermalink "/contact/" }}active{{ end }}">联系</a>
      {{ end }}
    </nav>
    <div class="lang-switch" aria-label="Language switcher">
      {{ if eq .Site.Language.Lang "en" }}
      <a href="{{ replaceRE "^/en" "" .RelPermalink }}">中文</a>
      {{ else }}
      <a href="{{ printf "/en%s" .RelPermalink }}">EN</a>
      {{ end }}
    </div>
  </div>
</header>
